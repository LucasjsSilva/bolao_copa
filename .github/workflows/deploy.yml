name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Supabase secrets
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          environment_file = Path('src/environments/environment.ts')
          content = environment_file.read_text()
          content = content.replace('__SUPABASE_URL__', os.environ['SUPABASE_URL'])
          content = content.replace('__SUPABASE_ANON_KEY__', os.environ['SUPABASE_ANON_KEY'])
          environment_file.write_text(content)
          PY
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build -- --base-href /bolao_copa/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/bolao_copa/browser
